name: Deploy Vestaboard Studio to VPS

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch or tag to deploy
        required: false
        default: main
  push:
    branches: [main]
    paths:
      - 'vestaboard/**'
      - '.github/workflows/deploy-vestaboard.yml'

concurrency:
  group: deploy-vestaboard
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          command_timeout: 15m
          script: |
            set -euo pipefail
            REF="${{ github.event.inputs.ref || 'main' }}"
            APP_DIR="$HOME/apps/bitbuy-csa-api"
            mkdir -p "$(dirname "$APP_DIR")"
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone https://github.com/Adamtj14/bitbuy-csa-api.git "$APP_DIR"
            fi
            cd "$APP_DIR"
            git fetch origin "$REF"
            git checkout -B deploy "origin/$REF"
            cd vestaboard
            if [ ! -f .env ]; then
              cp .env.example .env
              echo "::warning::vestaboard/.env was created from the example — fill in secrets on the VPS, then re-run"
            fi
            docker compose up -d --build
            docker compose ps
