name: VPS status check

# SSH into the VPS (same secrets as the deploy workflow) and report the
# Studio container's health, recent logs, and a local HTTP probe. Read-only
# by default; set 'action' to restart or redeploy when needed.

on:
  workflow_dispatch:
    inputs:
      action:
        description: What to do
        required: true
        default: status
        type: choice
        options:
          - status
          - restart
          - redeploy

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Run on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          command_timeout: 10m
          script: |
            set -uo pipefail
            APP_DIR="$HOME/apps/bitbuy-csa-api/vestaboard"
            cd "$APP_DIR" || { echo "app dir not found: $APP_DIR"; exit 1; }
            ACTION="${{ github.event.inputs.action }}"

            if [ "$ACTION" = "redeploy" ]; then
              echo "== git pull + rebuild =="
              (cd "$HOME/apps/bitbuy-csa-api" && git fetch origin main && git checkout -B deploy origin/main)
              docker compose up -d --build
            elif [ "$ACTION" = "restart" ]; then
              echo "== restart =="
              docker compose restart
            fi

            echo "== docker compose ps =="
            docker compose ps

            echo "== container health (last 40 log lines) =="
            docker compose logs --tail=40 || true

            echo "== local HTTP probe =="
            for path in / /api/config; do
              code=$(curl -s -o /dev/null -w '%{http_code}' "http://localhost:8787${path}" || echo "000")
              echo "GET ${path} -> ${code}"
            done

            echo "== .env presence (values redacted) =="
            if [ -f .env ]; then
              sed -E 's/=(.+)/=<set>/' .env | sed -E 's/^([A-Z_]+)=$/\1=<empty>/'
            else
              echo ".env is MISSING — server cannot start without SESSION_SECRET"
            fi
